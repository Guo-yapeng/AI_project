<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式剧情游戏</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">交互式剧情游戏</h1>
        
        <div class="video-notice" id="video-notice">
            <p>请准备视频文件并放入videos文件夹</p>
        </div>
        
        <div class="fullscreen-video-container hidden" id="video-container">
            <video id="story-video">
                <source src="" type="video/mp4">
                您的浏览器不支持视频播放。
            </video>
            
            <div id="image-container" class="image-container hidden">
                <div class="image-content">
                    <h2 id="image-title" class="image-title"></h2>
                    <img id="story-image" class="story-image" src="" alt="剧情图片">
                    <audio id="story-audio" class="story-audio" controls></audio>
                    <div class="audio-controls">
                        <button id="audio-toggle" class="audio-button">暂停音频</button>
                        <input type="range" id="audio-volume" class="audio-volume" min="0" max="1" step="0.1" value="0.7">
                    </div>
                    <button id="image-continue-button" class="image-continue-button">继续</button>
                </div>
            </div>
            
            <div id="choices-container" class="choices-container hidden">
                <h2 class="choice-prompt">请做出你的选择：</h2>
                <div class="choices-buttons" id="choices-buttons">
                    <!-- 选项按钮将通过JavaScript动态添加 -->
                </div>
            </div>
        </div>

        <div class="game-controls">
            <button id="start-game" class="control-button">开始游戏</button>
            <button id="restart-game" class="control-button hidden">重新开始</button>
        </div>
    </div>

    <script src="./js/game.js"></script>
</body>
</html>
